add_newline = true
scan_timeout = 100
command_timeout = 2000

palette = "catppuccin_mocha"

format = """
[╭─](surface2) $os$username[@](surface2)$hostname $directory${custom.giturl}$git_branch${custom.git_worktree}$git_status$nodejs$rust$golang$python$docker_context$fill$cmd_duration
[╰─](surface2) $character"""

# ========================================
# Palette
# ========================================
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"

# ========================================
# System
# ========================================
[os]
disabled = false
style = "fg:blue bold"
format = "$symbol "

[os.symbols]
Arch   = "󰣇"
Macos  = ""
Linux  = "󰌽"

[username]
show_always = true
style_user  = "fg:mauve bold"
format      = "[$user]($style)"

[hostname]
ssh_only = false
style    = "fg:mauve bold"
format   = "[$hostname]($style)"

# ========================================
# Directory
# ========================================
[directory]
style            = "fg:lavender bold"
format           = "[$path]($style)"
truncation_length = 4
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music"     = "󰝚 "
"Pictures"  = " "

# ========================================
# Git
# ========================================
[custom.giturl]
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2>/dev/null)
case "$GIT_REMOTE" in
  *github*)    GIT_REMOTE_SYMBOL="\ue709" ;;
  *gitlab*)    GIT_REMOTE_SYMBOL="\uf296" ;;
  *bitbucket*) GIT_REMOTE_SYMBOL="\ue703" ;;
  *git*)       GIT_REMOTE_SYMBOL="\uf1d3" ;;
  *)           GIT_REMOTE_SYMBOL="\uf233" ;;
esac
echo "$GIT_REMOTE_SYMBOL "
"""
when           = "git rev-parse --is-inside-work-tree 2> /dev/null"
format         = " $output"
require_repo   = true
ignore_timeout = true

[custom.git_worktree]
description = "Show indicator when inside a git worktree"
command = """
if git rev-parse --git-dir >/dev/null 2>&1; then
    common_dir=$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)
    git_dir=$(git rev-parse --path-format=absolute --git-dir 2>/dev/null)
    if [ "$common_dir" != "$git_dir" ]; then
        echo "⛓ "
    fi
fi
"""
when           = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format         = "[$output]($style)"
style          = "bold green"
require_repo   = true
ignore_timeout = true

[git_branch]
symbol = ""
style  = "fg:green"
format = " [$symbol $branch]($style)"

[git_status]
format     = "[$staged$modified$deleted$untracked$renamed$stashed$conflicted$ahead_behind]($style)"
staged     = "[+${count} ](green)"
modified   = "[!${count} ](yellow)"
deleted    = "[-${count} ](red)"
untracked  = "[?${count} ](sapphire)"
renamed    = "[»${count} ](blue)"
stashed    = "[≡${count} ](lavender)"
conflicted = "[✖${count} ](red bold)"
ahead      = "[⇡${count} ](teal)"
behind     = "[⇣${count} ](peach)"
diverged   = "[⇕⇡${ahead_count}⇣${behind_count} ](mauve)"

# ========================================
# Languages
# ========================================
[nodejs]
symbol = ""
style  = "fg:green"
format = " [$symbol $version]($style)"

[rust]
symbol = ""
style  = "fg:peach"
format = " [$symbol $version]($style)"

[golang]
symbol       = ""
style        = "fg:sky"
format       = " [$symbol $version]($style)"
detect_files = ["go.mod"]

[python]
symbol = ""
style  = "fg:yellow"
format = " [$symbol $version( \\($virtualenv\\))]($style)"

[docker_context]
symbol = ""
style  = "fg:blue"
format = " [$symbol $context]($style)"

# ========================================
# Prompt
# ========================================
[fill]
symbol = " "

[cmd_duration]
min_time = 2000
style    = "fg:yellow"
format   = " [$duration]($style)"

[character]
success_symbol = "[](bold green)"
error_symbol   = "[](bold red)"
vimcmd_symbol  = "[: ](bold fg:yellow)"

[line_break]
disabled = false
