add_newline = true
command_timeout = 1000

palette = "catppuccin_mocha"

format = """
[╭─](surface2) $os$username[@](surface2)$hostname $directory$git_branch$git_status$nodejs$rust$golang$python$docker_context$fill$cmd_duration
[╰─](surface2) $character"""

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[os]
disabled = false
style = "fg:blue bold"
format = "$symbol "

[os.symbols]
Arch = "󰣇"
Macos = ""

[username]
show_always = true
style_user = "fg:mauve bold"
format = "[$user]($style)"

[hostname]
ssh_only = false
style = "fg:mauve bold"
format = "[$hostname]($style)"

[directory]
style = "fg:lavender bold"
format = "[$path]($style)"
truncation_length = 4
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙"
"Downloads" = ""
"Music" = "󰝚"
"Pictures" = ""

[git_branch]
symbol = ""
style = "fg:green"
format = " [$symbol $branch]($style)"

[git_status]
style = "fg:red"
format = "[ $all_status$ahead_behind]($style)"

[nodejs]
symbol = ""
style = "fg:green"
format = "  [$symbol $version]($style)"

[rust]
symbol = ""
style = "fg:peach"
format = "  [$symbol $version]($style)"

[golang]
symbol = ""
style = "fg:sky"
format = "  [$symbol $version]($style)"

[python]
symbol = ""
style = "fg:yellow"
format = "  [$symbol $version]($style)"

[docker_context]
symbol = ""
style = "fg:blue"
format = "  [$symbol $context]($style)"

[fill]
symbol = " "

[cmd_duration]
min_time = 2000
style = "fg:yellow"
format = " [$duration]($style)"

[character]
success_symbol = "[](bold green)"
error_symbol = "[](bold red)"

[line_break]
disabled = false
